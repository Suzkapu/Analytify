<header class="app-header">
  <div class="header-left">
    <div class="header-logo" routerLink="/playlists">
      <img src="assets/Analytify.png" alt="Analytify Logo">
      <span class="logo-text">Analytify</span>
    </div>
    
    <!-- Navigation Buttons -->
    <nav class="header-nav" style="display: flex; gap: 8px; margin-left: 20px;">
      <a routerLink="/playlists" class="nav-link" routerLinkActive="active-nav" [routerLinkActiveOptions]="{exact: true}"><i class="pi pi-compass" style="font-size: 0.95rem;"></i> <span class="hide-mobile">Browse Playlists</span></a>
      <a routerLink="/stats" class="nav-link" routerLinkActive="active-nav"><i class="pi pi-chart-bar" style="font-size: 0.95rem;"></i> <span class="hide-mobile">Personal Stats</span></a>
    </nav>
  </div>
  <div class="header-center">
  </div>
  <div class="header-right">
    <button (click)="logout()" class="p-button logout-button">
      <i class="pi pi-sign-out"></i> <span class="hide-mobile">Logout</span>
    </button>
    <!-- User Profile Picture -->
    <div class="user-profile-header" *ngIf="profilePicUrl" style="display: flex; align-items: center;" title="Logged in">
      <img [src]="profilePicUrl" alt="User Profile" style="width: 44px; height: 44px; border-radius: 50%; object-fit: cover; border: 2px solid #1db954; box-shadow: 0 0 12px rgba(29, 185, 84, 0.35);">
    </div>
    <div class="user-profile-header" *ngIf="!profilePicUrl" style="display: flex; align-items: center;">
      <div style="width: 44px; height: 44px; border-radius: 50%; background: rgba(255, 255, 255, 0.08); display: flex; align-items: center; justify-content: center; border: 1.5px solid rgba(255, 255, 255, 0.2);">
        <i class="pi pi-user" style="font-size: 1.1rem; color: #b3b3b3;"></i>
      </div>
    </div>
  </div>
</header>

<!-- Under-Header Back Button -->
<div class="back-bar-container">
  <button (click)="goBack()" class="back-text-button" title="Back">
    <i class="pi pi-arrow-left"></i> Back
  </button>
</div>

<div class="details-container">
  <div class="artist-profile-card shadow-5">
    
    <!-- Profile Info -->
    <div class="profile-header" style="display: flex; flex-direction: column; align-items: center; text-align: center; margin-bottom: 20px; flex-shrink: 0;">
      <img alt="Artist Image" class="profile-image" [src]="artist.images && artist.images[0] ? artist.images[0].url : 'https://misc.scdn.co/liked-songs/liked-songs-300.png'" (click)="openArtistClick()" style="width: 120px; height: 120px; border-radius: 50%; object-fit: cover; cursor: pointer; border: 3px solid #1db954; transition: transform 0.2s ease; box-shadow: 0 8px 24px rgba(29, 185, 84, 0.15);" onmouseover="this.style.transform='scale(1.05)'" onmouseout="this.style.transform='scale(1)'"/>
      <h2 class="name" style="margin: 12px 0 6px 0; font-size: 2.2rem; font-weight: 800; color: #ffffff; cursor: pointer;" (click)="openArtistClick()">{{ artist.name }}</h2>
      <div class="genres-list" style="display: flex; flex-wrap: wrap; justify-content: center; gap: 6px; max-width: 500px;">
        <span *ngFor="let genre of artist.genres" style="display: inline-block; background: rgba(255, 255, 255, 0.08); padding: 4px 12px; border-radius: 50px; font-size: 0.75rem; font-weight: 600; color: #b3b3b3; text-transform: capitalize;">{{ genre }}</span>
        <span *ngIf="!artist.genres || !artist.genres.length" style="color: #666; font-size: 0.85rem;">No genres available</span>
      </div>
    </div>
    
    <!-- Tracks Section -->
    <h3 style="font-weight: 700; margin: 10px 0 12px 0; font-size: 1.15rem; color: #a7a7a7; flex-shrink: 0; display: flex; align-items: center; gap: 8px;">
      <i class="pi pi-music" style="color: #1db954;"></i> Songs in Playlist
    </h3>
    
    <div class="track-grid">
      <div *ngFor="let track of tracks" class="track-row-card" style="background: #242424; border: 1px solid rgba(255, 255, 255, 0.03); border-radius: 12px; padding: 12px; display: flex; align-items: center; gap: 12px; transition: all 0.2s ease;" onmouseover="this.style.background='#2a2a2a'; this.style.borderColor='rgba(29, 185, 84, 0.1)';" onmouseout="this.style.background='#242424'; this.style.borderColor='rgba(255, 255, 255, 0.03)';">
        <img (click)="openTrackClick(track.external_urls?.spotify)" alt="Track Image" class="track-image" [src]="track.album?.images && track.album?.images[0] ? track.album.images[0].url : 'https://misc.scdn.co/liked-songs/liked-songs-300.png'" style="width: 46px; height: 46px; border-radius: 6px; cursor: pointer; object-fit: cover; border: 1px solid rgba(255,255,255,0.05); flex-shrink: 0;"/>
        <div style="display: flex; flex-direction: column; min-width: 0; flex-grow: 1;">
          <span (click)="openTrackClick(track.external_urls?.spotify)" class="track-name" style="font-size: 0.95rem; font-weight: 700; cursor: pointer; color: #ffffff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: block;" onmouseover="this.style.color='#1db954'" onmouseout="this.style.color='#ffffff'">{{ track.name }}</span>
          <div style="display: flex; align-items: center; gap: 10px; margin-top: 4px;">
            <span *ngIf="track.popularity !== undefined" style="font-size: 0.75rem; color: #b3b3b3; font-weight: 500; display: flex; align-items: center; gap: 4px;">
              <i class="pi pi-chart-bar" style="font-size: 0.7rem; color: #1db954;"></i> Popularity: {{ track.popularity }}%
            </span>
            <span *ngIf="track.explicit" style="background: rgba(255, 50, 50, 0.15); color: #ff5252; font-size: 0.65rem; font-weight: 800; padding: 1px 4px; border-radius: 4px; letter-spacing: 0.5px; text-transform: uppercase;">E</span>
          </div>
        </div>
        <i class="pi pi-external-link" (click)="openTrackClick(track.external_urls?.spotify)" style="color: #666; cursor: pointer; font-size: 0.85rem;" onmouseover="this.style.color='#1db954'" onmouseout="this.style.color='#666'"></i>
      </div>
    </div>

  </div>
</div>
