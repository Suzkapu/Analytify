<div class="flex align-items-center justify-content-center min-h-screen bg-gray-900 text-white font-sans" style="background-color: #121212;">
  <div class="p-5 shadow-8 border-round-xl w-full max-w-md text-center" style="background-color: #1e1e1e; border-radius: 12px; box-shadow: 0 8px 32px 0 rgba(0,0,0,0.5);">
    <div *ngIf="!errorMessage">
      <i class="pi pi-spin pi-spinner text-5xl text-primary mb-3" style="font-size: 3rem; color: #1db954;"></i>
      <p class="text-xl font-semibold">{{ loadingMessage }}</p>
    </div>
    
    <div *ngIf="errorMessage" class="text-red-400" style="color: #ff5252;">
      <i class="pi pi-exclamation-triangle text-5xl mb-3" style="font-size: 3rem; margin-bottom: 1rem;"></i>
      <p class="text-xl font-semibold mb-2" style="font-size: 1.25rem; font-weight: 600; margin-bottom: 0.5rem;">Authentication Error</p>
      <p class="mb-4 text-sm" style="font-size: 0.875rem; line-height: 1.4; margin-bottom: 1.5rem; word-break: break-all;">{{ errorMessage }}</p>
      <button pButton label="Go back to Login" icon="pi pi-arrow-left" class="p-button-outlined p-button-danger" routerLink="/" style="color: #ff5252; border-color: #ff5252; background: transparent; padding: 0.5rem 1rem; border-radius: 4px; cursor: pointer;"></button>
    </div>
  </div>
</div>
