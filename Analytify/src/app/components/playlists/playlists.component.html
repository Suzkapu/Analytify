<header class="app-header">
  <div class="header-left">
    <div class="header-logo" routerLink="/playlists">
      <img src="assets/Analytify.png" alt="Analytify Logo">
      <span class="logo-text">Analytify</span>
    </div>

    <!-- Navigation Buttons -->
    <nav class="header-nav" style="display: flex; gap: 8px; margin-left: 20px;">
      <a routerLink="/playlists" class="nav-link" routerLinkActive="active-nav"
        [routerLinkActiveOptions]="{exact: true}"><i class="pi pi-compass" style="font-size: 0.95rem;"></i> <span class="hide-mobile">Browse Playlists</span></a>
      <a routerLink="/stats" class="nav-link" routerLinkActive="active-nav"><i class="pi pi-chart-bar" style="font-size: 0.95rem;"></i> <span class="hide-mobile">Personal Stats</span></a>
    </nav>
  </div>
  <div class="header-center">
  </div>
  <div class="header-right">
    <button (click)="logout()" class="p-button logout-button">
      <i class="pi pi-sign-out"></i> <span class="hide-mobile">Logout</span>
    </button>
    <!-- User Profile Picture -->
    <div class="user-profile-header" *ngIf="profilePicUrl" style="display: flex; align-items: center;"
      title="Logged in">
      <img [src]="profilePicUrl" alt="User Profile"
        style="width: 44px; height: 44px; border-radius: 50%; object-fit: cover; border: 2px solid #1db954; box-shadow: 0 0 12px rgba(29, 185, 84, 0.35);">
    </div>
    <div class="user-profile-header" *ngIf="!profilePicUrl" style="display: flex; align-items: center;">
      <div
        style="width: 44px; height: 44px; border-radius: 50%; background: rgba(255, 255, 255, 0.08); display: flex; align-items: center; justify-content: center; border: 1.5px solid rgba(255, 255, 255, 0.2);">
        <i class="pi pi-user" style="font-size: 1.1rem; color: #b3b3b3;"></i>
      </div>
    </div>
  </div>
</header>

<!-- Playlists Centered Title Bar -->
<div class="playlists-top-bar" *ngIf="playlists.length !== 0" style="display: flex; align-items: center; justify-content: center; min-height: 48px; width: 80vw; max-width: 1000px; margin: 20px auto 0 auto; box-sizing: border-box;">
  <div style="text-align: center;">
    <span
      style="font-size: 0.8rem; font-weight: 800; color: #1db954; text-transform: uppercase; letter-spacing: 1px; display: block; margin-bottom: 2px;">Spotify
      Analytics</span>
    <h2 style="margin: 0; font-weight: 800; color: #ffffff; font-size: 1.9rem;">Your Playlists</h2>
  </div>
</div>

<!-- Playlists Controls Bar -->
<div class="playlists-controls-bar" *ngIf="playlists.length !== 0">
  <div class="controls-left">
    <span class="p-input-icon-left search-container">
      <i class="pi pi-search"></i>
      <input (input)="filterPlaylists()" [(ngModel)]="searchText" class="search-input" pInputText
        placeholder="Search playlists..." type="text"
        style="border-radius: 20px; font-size: 0.95rem; padding-left: 2.5rem;" />
    </span>
  </div>
  <div class="controls-right">
    <button (click)="sortPlaylistsByTracks()" class="p-button p-button-outlined p-button-secondary"
      style="border-radius: 8px !important; padding: 0.5rem 1rem !important; display: flex; align-items: center; gap: 6px;"
      [style.background]="isSortedByCount ? 'rgba(30, 215, 96, 0.12) !important' : 'transparent !important'"
      [style.borderColor]="isSortedByCount ? '#1ed760 !important' : 'rgba(255, 255, 255, 0.2) !important'"
      [style.color]="isSortedByCount ? '#1ed760 !important' : '#e0e0e0 !important'"
      title="Sort playlists by song count">
      <i class="pi pi-sort-alt"></i> Sort By Count
    </button>
  </div>
</div>

<div *ngIf="playlists.length === 0" class="no-playlists" style="margin-top: 4rem;">No playlists found</div>

<div class="card-container" style="margin-top: 2rem;">
  <ng-container *ngFor="let playlist of filteredPlaylists">
    <div class="item-card">
      <div class="card-content">
        <div class="card-info">
          <div class="image-box">
            <img
              [src]="playlist.images && playlist.images[0] ? playlist.images[0].url : 'https://misc.scdn.co/liked-songs/liked-songs-300.png'"
              alt="Playlist Image">
          </div>
          <div class="playlist-details">
            <h2>{{ playlist.name }}</h2>
            <p class="song-count" *ngIf="playlist.tracks">
              {{ playlist.tracks.total }} {{ playlist.tracks.total === 1 ? 'song' : 'songs' }}
            </p>
            <p class="description">{{ playlist.description }}</p>
          </div>
        </div>
        <div class="card-actions">
          <p-button (click)="viewArtists(playlist.id)" label="Artists" />
          <button (click)="viewAnalysis(playlist.id)"
            class="p-button p-button-outlined p-button-secondary">Analyze</button>
        </div>
      </div>
    </div>
  </ng-container>
</div>
