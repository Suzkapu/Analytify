<app-header></app-header>


<div class="stats-dashboard-container">
  <!-- Centered Title Bar like Playlists -->
  <div style="display: flex; align-items: center; justify-content: center; min-height: 48px; width: 100%; margin: 20px auto 0 auto; box-sizing: border-box; text-align: center;">
    <div style="text-align: center;">
      <span style="font-size: 0.8rem; font-weight: 800; color: #1db954; text-transform: uppercase; letter-spacing: 1px; display: block; margin-bottom: 2px;">Spotify Player</span>
      <h2 style="margin: 0; font-weight: 800; color: #ffffff; font-size: 1.9rem;">Recently Played Songs</h2>
    </div>
  </div>

  <div class="stats-content-wrapper" style="margin-top: 30px;">
    <div *ngIf="isLoadingRecentlyPlayed" style="text-align: center; padding: 60px 0; width: 100%;">
      <i class="pi pi-spin pi-spinner" style="font-size: 2.5rem; color: #1db954;"></i>
      <h3 style="font-weight: 500; color: #b3b3b3; margin-top: 15px;">Loading listening history...</h3>
    </div>
    
    <div *ngIf="!isLoadingRecentlyPlayed && recentlyPlayedTracks.length === 0" style="color: #666; text-align: center; padding: 60px 0; width: 100%; font-size: 1.1rem;">
      No recently played tracks found.
    </div>

    <div *ngIf="!isLoadingRecentlyPlayed && recentlyPlayedTracks.length > 0" class="listening-history-list" style="width: 100%;">
      <div *ngFor="let item of recentlyPlayedTracks; let idx = index" class="track-row-card no-trend-pointer">
        <div class="track-index" style="width: 75px; display: flex; flex-direction: column; align-items: center; font-size: 0.8rem; color: #888; gap: 4px;">
          <span>#{{ idx + 1 }}</span>
          <span style="font-size: 0.65rem; color: #888; text-align: center; white-space: nowrap;">{{ formatPlayedAt(item.played_at) }}</span>
        </div>
        <img (click)="openTrackClick(item.track.external_urls?.spotify); $event.stopPropagation()"
          [src]="item.track.album?.images && item.track.album.images[0] ? item.track.album.images[0].url : 'https://misc.scdn.co/liked-songs/liked-songs-300.png'"
          alt="Track Cover" class="track-cover"
          [class.is-clickable]="!!item.track.external_urls?.spotify">
        <div class="track-info">
          <span class="track-title">{{ item.track.name }}</span>
          <span class="track-artist">{{ getTrackArtist(item.track) }}</span>
        </div>
        <div class="track-meta">
          <span *ngIf="item.track.explicit" class="explicit-badge">E</span>
        </div>
      </div>
    </div>
  </div>
</div>



<app-footer></app-footer>
